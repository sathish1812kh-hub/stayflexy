apiVersion: v1
kind: ServiceAccount
metadata:
  name: stayflexi-service-account
  namespace: stayflexi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stayflexi-service-role
  namespace: stayflexi
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stayflexi-service-rolebinding
  namespace: stayflexi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stayflexi-service-role
subjects:
- kind: ServiceAccount
  name: stayflexi-service-account
  namespace: stayflexi
