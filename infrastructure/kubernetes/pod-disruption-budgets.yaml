# PodDisruptionBudgets ensure minimum availability during node drains and rolling updates.
# All services with ≥ 2 replicas require at least 1 pod available at all times.
# Booking, payment and gateway (P0 services) require at least 2 pods available.

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: stayflexi
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: stayflexi
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service

