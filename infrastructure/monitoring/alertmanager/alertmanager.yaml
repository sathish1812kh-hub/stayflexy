global:
  resolve_timeout: 5m
  smtp_from: 'alerts@stayflexi.com'
  smtp_smarthost: 'smtp.stayflexi.com:587'
  smtp_require_tls: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-warnings'

  routes:
    # P0: Critical alerts — PagerDuty + Slack
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true

    - match:
        severity: critical
      receiver: slack-critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m

    # SLO burn rate — dedicated routing
    - match:
        slo: booking-availability
        severity: critical
      receiver: pagerduty-critical
      group_wait: 0s
      repeat_interval: 15m

    # P2: Warnings — Slack only
    - match:
        severity: warning
      receiver: slack-warnings
      group_wait: 2m
      repeat_interval: 2h

    # Infrastructure alerts — infra team
    - match:
        team: platform
      receiver: slack-platform
      continue: true

inhibit_rules:
  # If service is completely down, suppress latency/error rate alerts
  - source_match:
      alertname: ServiceDown
    target_match_re:
      alertname: (HighP95Latency|HighErrorRate|ElevatedErrorRate|ElevatedP95Latency)
    equal: ['service']

  # If Redis is down, suppress high memory usage alert
  - source_match:
      alertname: RedisDown
    target_match:
      alertname: RedisHighMemoryUsage
    equal: ['instance']

receivers:
  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#incidents-critical'
        title: ':rotating_light: [CRITICAL] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          *Runbook:* {{ .Annotations.runbook }}
          {{ end }}
        send_resolved: true

  - name: 'slack-warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_WARNINGS}'
        channel: '#alerts-warnings'
        title: ':warning: [WARNING] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  - name: 'slack-platform'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_PLATFORM}'
        channel: '#platform-alerts'
        title: '{{ .GroupLabels.severity | toUpper }}: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_INTEGRATION_KEY}'
        description: '{{ .GroupLabels.alertname }}: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        severity: 'critical'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
