# ─── PostgreSQL Daily Backup ──────────────────────────────────────────────────
# Runs pg_dump daily at 02:00 UTC and uploads to S3.
# Requires: AWS credentials in stayflexi-backup-secret (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, BACKUP_S3_BUCKET)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: stayflexi
  labels:
    app: postgres-backup
    component: backup
spec:
  schedule: "0 2 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: stayflexi-service-account
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/tmp/stayflexi-${TIMESTAMP}.dump"
                  echo "Starting PostgreSQL backup at $TIMESTAMP"

                  # Run pg_dump in custom format (compressed, parallel-restore capable)
                  pg_dump \
                    --format=custom \
                    --compress=9 \
                    --no-privileges \
                    --no-owner \
                    --verbose \
                    --file="$BACKUP_FILE" \
                    "$DATABASE_URL"

                  BACKUP_SIZE=$(du -sh "$BACKUP_FILE" | cut -f1)
                  echo "Backup complete: $BACKUP_FILE ($BACKUP_SIZE)"

                  # Upload to S3
                  apk add --no-cache aws-cli > /dev/null 2>&1
                  aws s3 cp "$BACKUP_FILE" \
                    "s3://${BACKUP_S3_BUCKET}/postgres/$(date +%Y/%m)/${TIMESTAMP}.dump" \
                    --storage-class STANDARD_IA

                  # Clean up local file
                  rm -f "$BACKUP_FILE"
                  echo "Backup uploaded to S3 successfully"

                  # Verify last 7 backups exist
                  BACKUP_COUNT=$(aws s3 ls "s3://${BACKUP_S3_BUCKET}/postgres/" --recursive | wc -l)
                  echo "Total backups in S3: $BACKUP_COUNT"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stayflexi-db-secret
                      key: DATABASE_URL
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: stayflexi-backup-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: stayflexi-backup-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: stayflexi-backup-secret
                      key: AWS_DEFAULT_REGION
                - name: BACKUP_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: stayflexi-backup-secret
                      key: BACKUP_S3_BUCKET
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              securityContext:
                runAsNonRoot: false  # pg_dump requires postgres user
                allowPrivilegeEscalation: false

---
# ─── Redis Snapshot (every 15 minutes) ────────────────────────────────────────
# Triggers a BGSAVE on Redis and stores the RDB to S3.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-snapshot
  namespace: stayflexi
  labels:
    app: redis-snapshot
    component: backup
spec:
  schedule: "*/15 * * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: stayflexi-service-account
          containers:
            - name: redis-snapshot
              image: redis:7-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "Triggering Redis BGSAVE at $TIMESTAMP"

                  # Trigger background save
                  redis-cli -u "$REDIS_URL" BGSAVE

                  # Wait for save to complete (poll for up to 60s)
                  for i in $(seq 1 30); do
                    STATUS=$(redis-cli -u "$REDIS_URL" LASTSAVE)
                    sleep 2
                    NEW_STATUS=$(redis-cli -u "$REDIS_URL" LASTSAVE)
                    if [ "$NEW_STATUS" != "$STATUS" ] || [ "$i" -eq "1" ]; then
                      echo "Save completed at epoch: $NEW_STATUS"
                      break
                    fi
                  done

                  echo "Redis snapshot triggered successfully"
              env:
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: stayflexi-redis-secret
                      key: REDIS_URL
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
              securityContext:
                runAsNonRoot: true
                runAsUser: 1001
                allowPrivilegeEscalation: false

---
# ─── Backup Secret Template ───────────────────────────────────────────────────
# Apply before CronJobs: kubectl apply -f this file (with actual values)
