# KEDA ScaledObjects for Kafka consumer group autoscaling.
# Requires KEDA v2.x installed: https://keda.sh/docs/latest/deploy/
# Install: helm install keda kedacore/keda --namespace keda --create-namespace

---
# workflow-service: scale based on booking.events consumer lag
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: workflow-service-kafka-scaler
  namespace: stayflexi
spec:
  scaleTargetRef:
    name: workflow-service
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka.stayflexi:9092,kafka-1.kafka.stayflexi:9092,kafka-2.kafka.stayflexi:9092
        consumerGroup: workflow-service-consumer
        topic: booking.events
        lagThreshold: "500"
        activationLagThreshold: "50"
        offsetResetPolicy: latest

---
# notification-service: scale based on booking.events + payment.events consumer lag
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification-service-kafka-scaler
  namespace: stayflexi
spec:
  scaleTargetRef:
    name: notification-service
  minReplicaCount: 2
  maxReplicaCount: 8
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka.stayflexi:9092,kafka-1.kafka.stayflexi:9092,kafka-2.kafka.stayflexi:9092
        consumerGroup: notification-service-booking-consumer
        topic: booking.events
        lagThreshold: "200"
        activationLagThreshold: "20"
        offsetResetPolicy: latest

---
# booking-service: scale based on HTTP request rate (CPU-based HPA already exists;
# this adds a custom metric trigger for queue depth during peak booking windows)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: booking-service-cpu-scaler
  namespace: stayflexi
spec:
  scaleTargetRef:
    name: booking-service
  minReplicaCount: 3
  maxReplicaCount: 15
  cooldownPeriod: 120
  pollingInterval: 30
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "65"

---
# analytics-service: scale based on aggregation workload (time-based scale-up
# during business hours, scale-down at night)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: analytics-service-cron-scaler
  namespace: stayflexi
spec:
  scaleTargetRef:
    name: analytics-service
  minReplicaCount: 1
  maxReplicaCount: 4
  cooldownPeriod: 300
  triggers:
    - type: cron
      metadata:
        timezone: Asia/Kolkata
        start: "0 8 * * 1-5"   # 8 AM IST weekdays
        end: "0 22 * * 1-5"    # 10 PM IST weekdays
        desiredReplicas: "3"
    - type: cron
      metadata:
        timezone: Asia/Kolkata
        start: "0 8 * * 0,6"   # 8 AM IST weekends
        end: "0 20 * * 0,6"    # 8 PM IST weekends
        desiredReplicas: "2"
