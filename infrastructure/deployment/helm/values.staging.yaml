# Staging environment overrides
# Apply with: helm upgrade --install stayflexi ./helm -f values.yaml -f values.staging.yaml -n stayflexi-staging

global:
  environment: staging

ingress:
  host: api-staging.stayflexi.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging

services:
  api-gateway:
    replicaCount: 1
    image:
      tag: "staging"
    resources:
      requests:
        cpu: 125m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    autoscaling:
      minReplicas: 1
      maxReplicas: 3

  auth-service:
    replicaCount: 1
    image:
