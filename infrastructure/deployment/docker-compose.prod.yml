version: '3.8'

networks:
  stayflexi-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - stayflexi-network
  env_file:
    - .env

x-service-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *service-defaults
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stayflexi}
      POSTGRES_USER: ${POSTGRES_USER:-stayflexi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stayflexi} -d ${POSTGRES_DB:-stayflexi}"]
      <<: *default-healthcheck
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    <<: *service-defaults
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      <<: *default-healthcheck
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/gateway/Dockerfile
    image: stayflexi/api-gateway:2.0.0
    <<: *service-defaults
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SERVICE_AUTH_URL: http://auth-service:3001
      SERVICE_ORGANIZATION_URL: http://organization-service:3002
      SERVICE_HOTEL_URL: http://hotel-service:3003
      SERVICE_INVENTORY_URL: http://inventory-service:3004
      SERVICE_BOOKING_URL: http://booking-service:3005
      SERVICE_PAYMENT_URL: http://payment-service:3006
      SERVICE_OTA_URL: http://ota-service:3007
      SERVICE_ANALYTICS_URL: http://analytics-service:3008
      SERVICE_NOTIFICATION_URL: http://notification-service:3009
      SERVICE_WORKFLOW_URL: http://workflow-service:3010
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.stayflexi.com}
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "100"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      <<: *default-healthcheck
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ../..
      dockerfile: src/services/auth-service/Dockerfile
    image: stayflexi/auth-service:2.0.0
    <<: *service-defaults
    expose:
      - "3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stayflexi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stayflexi}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      ACCESS_TOKEN_TTL: "900"
      REFRESH_TOKEN_TTL: "604800"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health/live"]
      <<: *default-healthcheck
    deploy:
      resources:
        limits:
          memory: 512m

