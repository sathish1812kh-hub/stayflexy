name: Platform Validation CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'platform-validation/**'
      - '.github/workflows/platform-validation.yml'
  pull_request:
    paths:
      - 'platform-validation/**'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full validation suite including performance benchmarks'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - run: npm run type-check
        working-directory: platform-validation

  test-contracts:
    name: Contract Validation Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - run: npm test -- --testPathPattern=contracts --passWithNoTests
        working-directory: platform-validation

  test-resilience:
    name: Resilience Validation Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - run: npm test -- --testPathPattern=resilience --passWithNoTests
        working-directory: platform-validation

  test-concurrency:
    name: Concurrency Validation Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - run: npm test -- --testPathPattern=concurrency --passWithNoTests
        working-directory: platform-validation

  test-security:
    name: Security Validation Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - run: npm test -- --testPathPattern=security --passWithNoTests
        working-directory: platform-validation

  test-observability:
    name: Observability Validation Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - run: npm test -- --testPathPattern=observability --passWithNoTests
        working-directory: platform-validation

  validation-report:
    name: Validation Report
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test-contracts
      - test-resilience
      - test-concurrency
      - test-security
      - test-observability
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: platform-validation/package-lock.json
      - run: npm ci
        working-directory: platform-validation
      - name: Run full test suite with coverage
        run: npm test -- --coverage --passWithNoTests
        working-directory: platform-validation
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-coverage
          path: platform-validation/coverage/
          retention-days: 30
