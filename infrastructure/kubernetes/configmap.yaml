apiVersion: v1
kind: ConfigMap
metadata:
  name: stayflexi-config
  namespace: stayflexi
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  JAEGER_ENDPOINT: "http://jaeger-collector.observability:14268/api/traces"
  EVENT_BUS_TYPE: "redis"
  SERVICE_AUTH_URL: "http://auth-service.stayflexi:3001"
  SERVICE_ORGANIZATION_URL: "http://organization-service.stayflexi:3002"
  SERVICE_HOTEL_URL: "http://hotel-service.stayflexi:3003"
  SERVICE_INVENTORY_URL: "http://inventory-service.stayflexi:3004"
  SERVICE_BOOKING_URL: "http://booking-service.stayflexi:3005"
  SERVICE_PAYMENT_URL: "http://payment-service.stayflexi:3006"
  SERVICE_OTA_URL: "http://ota-service.stayflexi:3007"
  SERVICE_ANALYTICS_URL: "http://analytics-service.stayflexi:3008"
  SERVICE_NOTIFICATION_URL: "http://notification-service.stayflexi:3009"
  SERVICE_WORKFLOW_URL: "http://workflow-service.stayflexi:3010"
  KAFKA_BROKERS: "kafka-0.kafka.stayflexi:9092,kafka-1.kafka.stayflexi:9092,kafka-2.kafka.stayflexi:9092"
  KAFKA_ENABLED: "true"
  OTEL_ENABLED: "true"
  JAEGER_ENABLED: "true"
