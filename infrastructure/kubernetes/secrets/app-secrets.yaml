# Template — replace placeholders with base64-encoded values before applying
# Example: echo -n 'your-secret-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: stayflexi-jwt-secret
  namespace: stayflexi
type: Opaque
data:
  JWT_SECRET: <BASE64_ENCODED_JWT_SECRET>
---
apiVersion: v1
kind: Secret
metadata:
  name: stayflexi-service-secret
  namespace: stayflexi
type: Opaque
data:
  SERVICE_KEY: <BASE64_ENCODED_SERVICE_KEY>
---
apiVersion: v1
kind: Secret
metadata:
  name: stayflexi-redis-secret
  namespace: stayflexi
type: Opaque
data:
  REDIS_URL: <BASE64_ENCODED_REDIS_URL>
