name: organization-service CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/organization-service/**'
      - 'packages/**'
      - '.github/workflows/organization-service.yml'
  pull_request:
    paths:
      - 'services/organization-service/**'
      - 'packages/**'

env:
  NODE_VERSION: '20'
  SERVICE_NAME: organization-service
  IMAGE_NAME: stayflexi/organization-service

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: services/organization-service/package-lock.json
      - run: npm ci
        working-directory: services/organization-service
      - run: npm run type-check
        working-directory: services/organization-service

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stayflexi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
        ports:
          - '5432:5432'
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - '6379:6379'
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/stayflexi_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-minimum-32-chars-long
      SERVICE_KEY: test-service-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: services/organization-service/package-lock.json
      - run: npm ci
        working-directory: services/organization-service
      - run: npx prisma generate
        working-directory: services/organization-service
      - run: npm test -- --coverage --passWithNoTests
        working-directory: services/organization-service

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/organization-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
