      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    env:
      ACCESS_TOKEN_TTL: "900"
      REFRESH_TOKEN_TTL: "604800"

  organization-service:
