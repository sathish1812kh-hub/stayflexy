name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}/stayflexi
  KUBE_NAMESPACE: stayflexi-staging

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ secrets.KUBECONFIG_STAGING != '' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: infrastructure/gateway/Dockerfile
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
          - service: organization-service
            dockerfile: services/organization-service/Dockerfile
          - service: hotel-service
            dockerfile: services/hotel-service/Dockerfile
          - service: inventory-service
            dockerfile: services/inventory-service/Dockerfile
          - service: booking-service
            dockerfile: services/booking-service/Dockerfile
          - service: payment-service
            dockerfile: services/payment-service/Dockerfile
          - service: ota-service
            dockerfile: services/ota-service/Dockerfile
          - service: analytics-service
            dockerfile: services/analytics-service/Dockerfile
          - service: notification-service
            dockerfile: services/notification-service/Dockerfile
          - service: workflow-service
            dockerfile: services/workflow-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=staging-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=staging-${{ matrix.service }}

  deploy-staging:
    name: Deploy to Staging Cluster
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.KUBECONFIG_STAGING != '' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Run migrations
        run: |
          kubectl apply -f infrastructure/kubernetes/jobs/prisma-migrate.yaml \
            -n ${{ env.KUBE_NAMESPACE }}
          kubectl wait --for=condition=complete --timeout=300s \
            job/prisma-migrate -n ${{ env.KUBE_NAMESPACE }}
          kubectl delete job prisma-migrate -n ${{ env.KUBE_NAMESPACE }} --ignore-not-found

      - name: Deploy all services
        run: |
          for svc in auth-service organization-service hotel-service inventory-service \
                     booking-service payment-service ota-service analytics-service \
                     notification-service workflow-service api-gateway; do
            kubectl set image deployment/"$svc" \
              "$svc"="${{ env.REGISTRY_PREFIX }}/$svc:staging" \
              -n ${{ env.KUBE_NAMESPACE }}
          done

      - name: Wait for rollouts
        run: |
          for svc in auth-service organization-service hotel-service inventory-service \
                     booking-service payment-service ota-service analytics-service \
                     notification-service workflow-service api-gateway; do
            kubectl rollout status deployment/"$svc" \
              -n ${{ env.KUBE_NAMESPACE }} --timeout=180s
          done
          echo "Staging deployment complete"
