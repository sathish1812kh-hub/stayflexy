global:
  environment: production
  imageRegistry: docker.io
  storageClass: standard

postgresql:
  enabled: false
  external:
    host: postgres.stayflexi.svc.cluster.local
    port: 5432
    database: stayflexi
    existingSecret: stayflexi-db-secret

redis:
  enabled: false
  external:
    host: redis.stayflexi.svc.cluster.local
    port: 6379
    existingSecret: stayflexi-redis-secret

ingress:
  enabled: true
  className: nginx
  host: api.stayflexi.com
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod

services:
  api-gateway:
    enabled: true
    replicaCount: 3
    image:
      repository: stayflexi/api-gateway
      tag: "2.0.0"
      pullPolicy: IfNotPresent
    service:
      type: LoadBalancer
      port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    env:
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "100"
      CORS_ORIGINS: "https://app.stayflexi.com,https://admin.stayflexi.com"

  auth-service:
    enabled: true
    replicaCount: 2
    image:
      repository: stayflexi/auth-service
      tag: "2.0.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3001
    resources:
