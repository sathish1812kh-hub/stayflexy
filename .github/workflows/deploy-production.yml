name: Deploy to Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # semver tags only: v2.0.0, v2.1.0, etc.
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. v2.0.1)'
        required: true
        type: string
      service:
        description: 'Single service to deploy (leave empty for all)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}/stayflexi
  NODE_VERSION: '20'
  KUBE_NAMESPACE: stayflexi

jobs:
  # ─── Resolve tag ─────────────────────────────────────────────────────────────
  resolve-tag:
    name: Resolve Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  # ─── Build & push all service images ─────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: resolve-tag
    if: ${{ inputs.service == '' || inputs.service == matrix.service }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: infrastructure/gateway/Dockerfile
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
          - service: organization-service
            dockerfile: services/organization-service/Dockerfile
          - service: hotel-service
            dockerfile: services/hotel-service/Dockerfile
          - service: inventory-service
            dockerfile: services/inventory-service/Dockerfile
          - service: booking-service
            dockerfile: services/booking-service/Dockerfile
          - service: payment-service
            dockerfile: services/payment-service/Dockerfile
          - service: ota-service
            dockerfile: services/ota-service/Dockerfile
          - service: analytics-service
            dockerfile: services/analytics-service/Dockerfile
          - service: notification-service
            dockerfile: services/notification-service/Dockerfile
          - service: workflow-service
            dockerfile: services/workflow-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ matrix.service }}:${{ needs.resolve-tag.outputs.image_tag }}
            ${{ env.REGISTRY_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.image_tag }}

  # ─── Run database migrations ──────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Apply migration Job
        run: |
          IMAGE_TAG="${{ needs.resolve-tag.outputs.image_tag }}"
          kubectl apply -f infrastructure/kubernetes/jobs/prisma-migrate.yaml -n ${{ env.KUBE_NAMESPACE }}
          # Wait for migration to complete (max 5 minutes)
          kubectl wait --for=condition=complete \
            --timeout=300s \
            job/prisma-migrate \
            -n ${{ env.KUBE_NAMESPACE }} || {
            echo "Migration job failed — aborting deployment"
            kubectl logs -l job-name=prisma-migrate -n ${{ env.KUBE_NAMESPACE }}
            exit 1
          }
          kubectl delete job prisma-migrate -n ${{ env.KUBE_NAMESPACE }} --ignore-not-found

  # ─── Deploy to Kubernetes ─────────────────────────────────────────────────────
  deploy:
    name: Deploy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-and-push, migrate]
    environment: production
    strategy:
      max-parallel: 3   # rolling: deploy 3 services at a time
      matrix:
        service:
          - auth-service
          - organization-service
          - hotel-service
          - inventory-service
          - booking-service
          - payment-service
          - ota-service
          - analytics-service
          - notification-service
          - workflow-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Update image tag
        run: |
          IMAGE="${{ env.REGISTRY_PREFIX }}/${{ matrix.service }}:${{ needs.resolve-tag.outputs.image_tag }}"
          kubectl set image \
            deployment/${{ matrix.service }} \
            ${{ matrix.service }}="${IMAGE}" \
            -n ${{ env.KUBE_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status \
            deployment/${{ matrix.service }} \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=300s

      - name: Verify readiness probe
        run: |
          kubectl wait \
            --for=condition=available \
            --timeout=120s \
            deployment/${{ matrix.service }} \
            -n ${{ env.KUBE_NAMESPACE }}

  # ─── Post-deploy verification ────────────────────────────────────────────────
  verify:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Check all deployments are available
        run: |
          FAILED=()
          for svc in auth-service organization-service hotel-service inventory-service \
                     booking-service payment-service ota-service analytics-service \
                     notification-service workflow-service api-gateway; do
            STATUS=$(kubectl get deployment "$svc" -n ${{ env.KUBE_NAMESPACE }} \
              -o jsonpath='{.status.availableReplicas}' 2>/dev/null || echo "0")
            DESIRED=$(kubectl get deployment "$svc" -n ${{ env.KUBE_NAMESPACE }} \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
            if [[ "$STATUS" -lt "$DESIRED" ]]; then
              echo "FAIL: $svc — $STATUS/$DESIRED replicas available"
              FAILED+=("$svc")
            else
              echo "OK:   $svc — $STATUS/$DESIRED replicas"
            fi
          done
          if [[ ${#FAILED[@]} -gt 0 ]]; then
            echo "Deployment verification failed for: ${FAILED[*]}"
            exit 1
          fi
          echo "All services healthy"

      - name: Tag deployment in git
        run: |
          echo "Deployed ${{ needs.resolve-tag.outputs.image_tag }} to production at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─── Rollback on failure ─────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    if: failure()
    environment: production
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Rollback all services
        run: |
          echo "Deployment failed — rolling back all services"
          for svc in auth-service organization-service hotel-service inventory-service \
                     booking-service payment-service ota-service analytics-service \
                     notification-service workflow-service api-gateway; do
            kubectl rollout undo deployment/"$svc" -n ${{ env.KUBE_NAMESPACE }} || true
          done
          echo "Rollback issued for all services — verify manually"
